<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Quiz App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#141e30,#243b55);
      color:white;
    }

    /* Quiz Container */

    .quiz-box{
      width:400px;
      background:rgba(145, 153, 201, 0.725);
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      font-size:32px;
      letter-spacing:1px;
    }

    /* Progress Bar */

    .progress-container{
      width:100%;
      height:7px;
      background:rgba(9, 7, 13, 0.749);
      border-radius:10px;
      overflow:hidden;
      margin-bottom:20px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:rgba(1, 186, 78, 0.819);
      border-radius:5px;
      transition:0.4s;
    }

    /* Question */

    #question{
      font-size:20px;
      margin-bottom:20px;
      font-weight:bold;
    }

    /* Options */

    .option{
      background:white;
      color:black;
      padding:14px;
      margin:12px 0;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
      font-size:16px;
    }

    .option:hover{
      background:#dcdcdc;
      transform:scale(1.02);
    }

    /* Selected Option */

    .selected{
      background:#28a745;
      color:white;
      font-weight:bold;
      border:2px solid white;
    }

    /* Button */

    button{
      width:100%;
      padding:14px;
      margin-top:18px;
      border:none;
      border-radius:10px;
      background:#007bff;
      color:white;
      font-size:17px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      background:#0056b3;
      transform:scale(1.03);
    }

    /* Result */

    #result{
      text-align:center;
      font-size:22px;
      margin-top:20px;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="quiz-box">

    <h2>Quiz Game</h2>

    <!-- Progress Bar -->

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Question -->

    <div id="question"></div>

    <!-- Options -->

    <div id="options"></div>

    <!-- Button -->

    <button onclick="nextQuestion()">
      Next Question
    </button>

    <!-- Result -->

    <div id="result"></div>

  </div>

  <script>

    const quizData = [

      {
        question: "What does HTML stand for?",

        options: [
          "Hyper Text Markup Language",
          "High Text Machine Language",
          "Hyper Transfer Markup Language",
          "Home Tool Markup Language"
        ],

        answer: "Hyper Text Markup Language"
      },

      {
        question: "Which language is used for styling web pages?",

        options: [
          "HTML",
          "CSS",
          "Python",
          "C"
        ],

        answer: "CSS"
      },

      {
        question: "Which language is used for webpage functionality?",

        options: [
          "Java",
          "Python",
          "JavaScript",
          "C++"
        ],

        answer: "JavaScript"
      }

    ];

    let currentQuestion = 0;
    let score = 0;
    let selectedAnswer = "";

    // Load Question

    function loadQuestion(){

      let questionData =
      quizData[currentQuestion];

      // Display Question

      document.getElementById("question").innerHTML =
      questionData.question;

      // Display Options

      let optionsHTML = "";

      questionData.options.forEach(option => {

        optionsHTML += `

          <div class="option"
          onclick="selectAnswer(this,'${option}')">

          ${option}

          </div>

        `;
      });

      document.getElementById("options").innerHTML =
      optionsHTML;

      // Update Progress Bar

      let progress =
      (currentQuestion / quizData.length) * 100;

      document.getElementById("progressBar").style.width =
      progress + "%";
    }

    // Select Answer

    function selectAnswer(element, answer){

      selectedAnswer = answer;

      // Remove old selected option

      let options =
      document.querySelectorAll(".option");

      options.forEach(option => {
        option.classList.remove("selected");
      });

      // Add selected class

      element.classList.add("selected");
    }

    // Next Question

    function nextQuestion(){

      // Check Answer

      if(selectedAnswer ==
      quizData[currentQuestion].answer){

        score++;
      }

      currentQuestion++;
      selectedAnswer = "";

      // Load Next Question

      if(currentQuestion < quizData.length){

        loadQuestion();
      }

      // Quiz Completed

      else{

        document.getElementById("progressBar").style.width =
        "100%";

        document.querySelector(".quiz-box").innerHTML = `

          <h2>Quiz Completed 🎉</h2>

          <p id="result">
          Your Score: ${score} / ${quizData.length}
          </p>

        `;
      }
    }

    // Start Quiz

    loadQuestion();

  </script>

</body>
</html>
